# ==============================
# 🎚️ Controle de Logs (Silencioso)
# ==============================
spring.config.import=optional:file:.env[.properties],optional:file:api/.env[.properties]

# Desativa logs internos do Spring
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Logs customizados (só erros graves)
logging.level.com.igreja=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.quartz=OFF
logging.level.com.suapacote=DEBUG

# ==============================
# ⛳ Configurações Essenciais
# ==============================
spring.application.name=api
server.port=${PORT:8080}
spring.profiles.active=dev
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500}

# Cloudinary via env
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}


# ==============================
# 🗃️ Database (PostgreSQL)
# ==============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ==============================
# ⚡ Configurações de Performance
# ==============================
spring.main.lazy-initialization=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.datasource.hikari.maximum-pool-size=5

# ==============================
# 🚀 Outros Módulos (Configuração Mínima)
# ==============================
# Actuator (só health check)
management.endpoints.web.exposure.include=health

# Swagger (se necessário)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Jetty
server.jetty.acceptors=4
server.jetty.selectors=8
server.jetty.max-http-form-post-size=2MB

# MVC
spring.mvc.dispatch-options-request=true


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================
# 📤 Upload de Arquivos
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

spring.jackson.stream-write-constraints.max-nesting-depth=2000


spring.quartz.jdbc.initialize-schema=always
# Quartz Configuration
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.jdbc.schema=classpath:org/quartz/impl/jdbcjobstore/tables_postgres.sql

# Quartz Properties
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
spring.quartz.properties.org.quartz.jobStore.useProperties=true
spring.quartz.properties.org.quartz.jobStore.dataSource=myDS
spring.quartz.properties.org.quartz.dataSource.myDS.driver=org.postgresql.Driver
spring.quartz.properties.org.quartz.dataSource.myDS.URL=jdbc:postgresql://localhost:5432/igreja_db
spring.quartz.properties.org.quartz.dataSource.myDS.user=${DB_USERNAME}
spring.quartz.properties.org.quartz.dataSource.myDS.password=${DB_PASSWORD}
spring.quartz.properties.org.quartz.dataSource.myDS.maxConnections=5
